const ERC20_ABI = [
  {"constant":true,"inputs":[{"name":"account","type":"address"}],"name":"balanceOf","outputs":[{"name":"","type":"uint256"}],"type":"function"},
  {"constant":false,"inputs":[{"name":"from","type":"address"},{"name":"to","type":"address"},{"name":"value","type":"uint256"}],"name":"transferFrom","outputs":[{"name":"","type":"bool"}],"type":"function"},
  {"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"}
];

    { id: 7, home: "🇭🇷 克罗地亚", away: "🇧🇪 比利时", date: "2026-06-23 21:00", status: "upcoming", userPick: null, resolved: false, result: null },

let userPredictions = {};

const connectBtn = document.getElementById('connectWalletBtn');

function showToast(message, isError = false) {
    toastMsgDiv.innerText = message;
    toastMsgDiv.style.display = 'block';
    toastMsgDiv.style.background = isError ? '#8b2c1ae6' : '#1f2b38e6';
    toastMsgDiv.style.borderLeftColor = isError ? '#ff6b4a' : '#F5A623';
    setTimeout(() => toastMsgDiv.style.display = 'none', 3800);
}

async function fetchTokenBalance(account) {
    if (!account || !tokenContract) return 0;
    try {
        const raw = await tokenContract.methods.balanceOf(account).call();
        return Number(web3.utils.fromWei(raw, TOKEN_DECIMALS));
    } catch (e) {
        console.error("查询余额失败", e);
        return 0;
    }
}

async function updateBalanceUI() {
    if (userAccount) {
        userTokenBalance = await fetchTokenBalance(userAccount);
        tokenBalanceSpan.innerText = userTokenBalance.toFixed(4);
    } else {
        tokenBalanceSpan.innerText = '0.0000';
    }
}

async function submitPrediction(matchId, pick, amount) {
    if (!userAccount || !tokenContract) {
        showToast("⚠️ 请先连接钱包!", true);
        return false;
    }
    const match = matches.find(m => m.id === matchId);
    if (!match || match.resolved || userPredictions[matchId]?.submitted) {
        showToast("无法提交预测", true);
        return false;
    }
    if (isNaN(amount) || amount <= 0 || amount > userTokenBalance) {
        showToast("金额异常或余额不足", true);
        return false;
    }
    const rawAmount = web3.utils.toWei(amount.toString(), TOKEN_DECIMALS);
    showToast(`⏳ 正在扣币 ${amount} 代币...`, false);
    try {
        const TREASURY = userAccount;
        await tokenContract.methods.transferFrom(userAccount, TREASURY, rawAmount).send({ from: userAccount });

        await updateBalanceUI();
        renderMatches();
        showToast(`✅ 预测成功！消耗 ${amount} 代币`, false);
        return true;
    } catch (e) {
        console.error(e);
        showToast("❌ 交易失败，未授权或余额不足", true);
        return false;
    }
}

// 管理员结算判定输赢
async function resolveMatchAndReward(matchId, winnerResult) {
    const match = matches.find(m => m.id === matchId);
    if (!match || match.resolved) return;
    match.resolved = true;
    match.result = winnerResult;
    const userPred = userPredictions[matchId];
    if (userPred && userPred.submitted) {
        if (userPred.pick === winnerResult) {
            showToast(`🎉 预测正确！奖励 ${userPred.amount * REWARD_MULTIPLIER} 代币`, false);
        } else {
            showToast(`😢 预测未中`, false);
        }
    }
    renderMatches();
    loadAdminMatchList();
}

function loadAdminMatchList() {
    adminMatchSelect.innerHTML = "";
    matches.forEach(m => {
        if (!m.resolved) {
            let opt = document.createElement("option");
            opt.value = m.id;
            opt.innerText = `#${m.id} ${m.home} vs ${m.away}`;
            adminMatchSelect.appendChild(opt);
        }
    });
}

function renderMatches() {
    matchesGrid.innerHTML = '';
    for (let match of matches) {
        const predRecord = userPredictions[match.id] || { pick: null, amount: 0, submitted: false };
        const isSubmitted = predRecord.submitted;
        const selectedPick = predRecord.pick;
        const isResolved = match.resolved;
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
            <div class="match-date">
                <span><i class="far fa-calendar-alt"></i> ${match.date}</span>
                <span><i class="fas fa-globe-asia"></i> 小组赛 · 焦点战</span>
            </div>
            <div class="teams">
                <div class="team"><strong>${match.home}</strong></div>
                <div class="vs">⚡ VS ⚡</div>

            </div>
            <div class="prediction-buttons">
                <button class="pred-btn win ${selectedPick === 'win' && !isSubmitted ? 'active' : ''}" data-pick="win" ${isSubmitted || isResolved ? 'disabled' : ''}><i class="fas fa-flag-checkered"></i> ${match.home} 胜</button>
                <button class="pred-btn draw ${selectedPick === 'draw' && !isSubmitted ? 'active' : ''}" data-pick="draw" ${isSubmitted || isResolved ? 'disabled' : ''}><i class="fas fa-handshake"></i> 平局</button>
                <button class="pred-btn lose ${selectedPick === 'lose' && !isSubmitted ? 'active' : ''}" data-pick="lose" ${isSubmitted || isResolved ? 'disabled' : ''}><i class="fas fa-futbol"></i> ${match.away} 胜</button>
            </div>
            ${!isResolved ? `
                <div class="bet-amount-input-container">
                    <label>押注金额：</label>
                    <input type="number" id="betAmount-${match.id}" class="bet-amount-input" min="1" placeholder="输入代币数量" ${isSubmitted ? 'disabled' : ''} value="${isSubmitted ? predRecord.amount : ''}">
                </div>
                <button class="submit-pred" data-matchid="${match.id}" ${isSubmitted ? 'disabled' : ''}>${isSubmitted ? '✓ 已预测 · 等待开奖' : '🔥 消耗代币预测赢家'}</button>
                ${isSubmitted ? `<div class="status-msg"><i class="fas fa-check-circle"></i> 已押注 ${predRecord.amount} 枚</div>` : `<div class="status-msg"><i class="fas fa-coins"></i> 猜对赢双倍奖励</div>`}
            ` : `
                <div class="status-msg"><i class="fas fa-chart-line"></i> 赛果：${match.result === 'win' ? match.home+'胜' : match.result === 'lose' ? match.away+'胜' : '平局'}</div>
            `}
        `;
        matchesGrid.appendChild(card);
    }
    document.querySelectorAll('.submit-pred').forEach(btn => {
        btn.addEventListener('click', async (e) => {
            const matchId = parseInt(btn.dataset.matchid);
            if (userPredictions[matchId]?.submitted) return showToast("不可重复预测", true);
            const parentCard = btn.closest('.match-card');
            const activePickBtn = parentCard.querySelector('.pred-btn.active');
            if (!activePickBtn) return showToast("请先选择胜负平局", true);
            const amount = Number(parentCard.querySelector(`#betAmount-${matchId}`).value);
            const pick = activePickBtn.dataset.pick;
            await submitPrediction(matchId, pick, amount);
        });
    });
    document.querySelectorAll('.pred-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (btn.disabled) return;
            const parent = btn.closest('.match-card');
            parent.querySelectorAll('.pred-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });
}

async function connectWallet() {
    if (!window.ethereum) return showToast("请安装MetaMask并切换BSC", true);
    try {
        web3 = new Web3(window.ethereum);
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        const accounts = await web3.eth.getAccounts();
        if (!accounts.length) return;
        userAccount = accounts[0];
        tokenContract = new web3.eth.Contract(ERC20_ABI, TOKEN_ADDRESS);
        const chainId = await web3.eth.getChainId();
        if (chainId !== 56 && chainId !== 97) showToast("请切换BSC主网", true);
        const shortAddr = `${userAccount.slice(0,6)}...${userAccount.slice(-4)}`;
        walletContainer.innerHTML = `<div class="wallet-address" style="background:#00000066; border-radius:40px; padding:8px 20px;"><i class="fas fa-link"></i> ${shortAddr}</div>`;
        tokenBar.style.display = 'flex';
        // 校验管理员身份
        if (userAccount.toLowerCase() === ADMIN_WALLET.toLowerCase()) {
            adminPanel.style.display = "block";
            loadAdminMatchList();
        } else {
            adminPanel.style.display = "none";
        }
        await updateBalanceUI();
        renderMatches();
        showToast(`钱包已连接: ${shortAddr}`, false);
    } catch (err) {
        showToast("连接钱包失败", true);
    }
}

// 管理员结算点击事件
adminResolveBtn.addEventListener("click",()=>{
    const mid = Number(adminMatchSelect.value);
    const res = adminResultSelect.value;
    if(!mid||!res) return alert("请选择比赛与赛果");
    resolveMatchAndReward(mid,res);
    showToast("✅ 比赛结算完成",false);
});

connectBtn.addEventListener('click', connectWallet);
renderMatches();
if (window.ethereum && window.ethereum.selectedAddress) connectWallet();
if (window.ethereum) {
    window.ethereum.on('accountsChanged', accounts => {
        if(accounts.length){
            userAccount = accounts[0];
            tokenContract = new web3.eth.Contract(ERC20_ABI, TOKEN_ADDRESS);
            if (userAccount.toLowerCase() === ADMIN_WALLET.toLowerCase()) {
                adminPanel.style.display = "block";
                loadAdminMatchList();
            } else {
                adminPanel.style.display = "none";
            }
            updateBalanceUI();renderMatches();showToast("账户已切换",false);
        }else{
            userAccount=null;tokenContract=null;tokenBar.style.display='none';adminPanel.style.display='none';
            renderMatches();
            walletContainer.innerHTML='<button id="connectWalletBtn" class="wallet-btn"><i class="fas fa-wallet"></i> 连接钱包 (BSC)</button>';
            document.getElementById('connectWalletBtn').addEventListener('click',connectWallet);
        }
    });
    window.ethereum.on('chainChanged',()=>location.reload());
}
</script>
