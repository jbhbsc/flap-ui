<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>杠杆保证金交易</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei}
        body{background:#f5f7fa;color:#333;padding:20px;max-width:700px;margin:0 auto}
        .card{background:#fff;border-radius:14px;padding:24px;margin-bottom:20px;box-shadow:0 2px 12px #e5e7eb}
        h3{margin-bottom:16px;color:#222}
        .btn{border:none;border-radius:8px;padding:12px 0;font-size:15px;cursor:pointer;font-weight:500}
        .btn-primary{background:#409eff;color:#fff}
        .btn-danger{background:#f56c6c;color:#fff}
        .btn-group{display:flex;gap:10px;margin:15px 0}
        .btn-group button{flex:1;padding:10px;border:1px solid #ddd;background:#fff;border-radius:6px;cursor:pointer}
        .btn-group button.active{border-color:#409eff;background:#ecf5ff;color:#409eff}
        input{width:100%;padding:12px;border:1px solid #e5e7eb;border-radius:8px;margin:10px 0;font-size:14px}
        .pos-item{padding:15px;border:1px solid #eee;border-radius:8px;margin:10px 0}
    </style>
</head>
<body>
    <h2 style="margin-bottom:20px;text-align:center">保证金杠杆交易</h2>

    <div class="card">
        <button id="connectBtn" class="btn btn-primary">连接钱包</button>
    </div>

    <div class="card">
        <h3>开仓交易</h3>
        <div class="btn-group">
            <button id="longBtn" class="active">开多</button>
            <button id="shortBtn">开空</button>
        </div>
        <input type="number" id="marginInput" placeholder="输入保证金 BNB" step="0.001">
        <div class="btn-group">
            <button class="leverage-btn active" data-lv="1">1倍</button>
            <button class="leverage-btn" data-lv="2">2倍</button>
            <button class="leverage-btn" data-lv="3">3倍</button>
            <button class="leverage-btn" data-lv="5">5倍</button>
        </div>
        <button id="openBtn" class="btn btn-primary">确认开仓</button>
    </div>

    <div class="card">
        <h3>我的持仓</h3>
        <div id="positionsList">暂无持仓记录</div>
    </div>

<script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>
<script>
// 替换为你实际部署的金库合约地址
const VAULT_ADDR = "0x273a18a5756dDc4EcE755fC0eDa7bB5766eb5cea";
const VAULT_ABI = [
    "function openPosition(bool isLong,uint256 leverage)external payable returns(uint256)",
    "function closePosition(uint256 id)external returns(int256)",
    "function getUserPositions(address)external view returns(uint256[])",
    "function getPosition(uint256)external view returns(address,bool,uint256,uint256,uint256,uint256,bool,int256)"
];

let provider,signer,vault;
let isLong = true;
let lever = 1;

// 钱包连接
document.getElementById("connectBtn").onclick = async()=>{
    if(!window.ethereum)return alert("请安装MetaMask钱包");
    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts",[]);
    signer = provider.getSigner();
    vault = new ethers.Contract(VAULT_ADDR,VAULT_ABI,signer);
    alert("钱包连接成功");
    loadPos();
}

// 多空切换
document.getElementById("longBtn").onclick=()=>{
    isLong=true;
    document.getElementById("longBtn").classList.add("active");
    document.getElementById("shortBtn").classList.remove("active");
}
document.getElementById("shortBtn").onclick=()=>{
    isLong=false;
    document.getElementById("shortBtn").classList.add("active");
    document.getElementById("longBtn").classList.remove("active");
}

// 杠杆选择
document.querySelectorAll(".leverage-btn").forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll(".leverage-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        lever = Number(btn.dataset.lv);
    }
})

// 开仓
document.getElementById("openBtn").onclick=async()=>{
    if(!vault)return alert("先连接钱包");
    let val = document.getElementById("marginInput").value;
    if(!val||val<=0)return alert("输入合法保证金");
    try{
        let tx = await vault.openPosition(isLong,lever,{value:ethers.utils.parseEther(val)});
        await tx.wait();
        alert("开仓成功");
        loadPos();
    }catch(e){alert("交易失败："+e.message)}
}

// 加载持仓
async function loadPos(){
    if(!vault)return;
    let addr = await signer.getAddress();
    let ids = await vault.getUserPositions(addr);
    let box = document.getElementById("positionsList");
    if(ids.length===0){box.innerHTML="暂无持仓记录";return}
    box.innerHTML="";
    for(let id of ids){
        let p = await vault.getPosition(id);
        let div = document.createElement("div");
        div.className="pos-item";
        div.innerHTML=`
            <p>仓位ID：${id}</p>
            <p>方向：${p[1]?"多头":"空头"}</p>
            <p>保证金：${ethers.utils.formatEther(p[2])} BNB</p>
            <p>杠杆：${p[3]}倍</p>
            <p>实时盈亏：${p[7].toString()}</p>
            <button onclick="closePos(${id})" class="btn btn-danger" style="width:100%;margin-top:8px">平仓</button>
        `;
        box.appendChild(div);
    }
}

// 平仓
window.closePos = async(id)=>{
    if(!vault)return;
    try{
        await vault.closePosition(id);
        alert("平仓完成");
        loadPos();
    }catch(e){alert("平仓失败："+e.message)}
}
</script>
</body>
</html>
