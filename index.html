<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CBA Finals Predictor</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #080912;
      --panel: rgba(9, 12, 24, 0.74);
      --line: rgba(255, 255, 255, 0.13);
      --text: #f6f8ff;
      --muted: #9ea7bd;
      --red: #ff315d;
      --blue: #21a8ff;
      --cyan: #36f5ff;
      --gold: #ffc857;
      --green: #43e88d;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 49, 93, 0.2), transparent 26rem),
        radial-gradient(circle at 82% 14%, rgba(33, 168, 255, 0.2), transparent 28rem),
        linear-gradient(115deg, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px 64px),
        repeating-linear-gradient(90deg, #17100c 0 8px, #21150e 8px 16px, #27180f 16px 24px);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -25%;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(255,255,255,.2), transparent 22%),
        radial-gradient(ellipse at 68% 35%, rgba(255,255,255,.16), transparent 24%);
      mix-blend-mode: screen;
      animation: lights 16s linear infinite;
      opacity: .38;
      z-index: 0;
    }

    @keyframes lights {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: radial-gradient(circle at 35% 25%, #fff3 0 15%, transparent 16%), linear-gradient(135deg, var(--red), var(--blue));
      box-shadow: 0 0 24px rgba(255, 200, 87, .2);
      font-size: 25px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .tagline {
      margin-top: 5px;
      color: var(--muted);
      font-size: 14px;
    }

    .wallet-box {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .wallet-state {
      color: var(--muted);
      border: 1px solid var(--line);
      background: rgba(0,0,0,.28);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .social-links {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      padding: 0;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.08);
      font-weight: 800;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .social-link svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .social-link.telegram {
      border-color: rgba(42, 171, 238, .45);
      background: #2aabee;
    }

    .social-link.x-social {
      border-color: rgba(255, 255, 255, .2);
      background: rgba(0,0,0,.38);
    }

    .social-link:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 34px rgba(0,0,0,.28);
    }

    button, input {
      font: inherit;
    }

    button {
      border: 0;
      color: var(--text);
      border-radius: 8px;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease, border-color .18s ease;
    }

    button:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 12px 34px rgba(0,0,0,.28);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .48;
    }

    .primary-btn {
      background: linear-gradient(135deg, #f83c5c, #ffb545);
      padding: 12px 16px;
      font-weight: 800;
    }

    .ghost-btn {
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line);
      padding: 11px 14px;
      font-weight: 700;
    }

    .notice {
      margin-bottom: 16px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 200, 87, .32);
      border-radius: 8px;
      color: #ffe7a3;
      background: rgba(255, 200, 87, .08);
      display: none;
    }

    .schedule {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 8px 2px 18px;
      scroll-snap-type: x mandatory;
    }

    .game-tab {
      min-width: 132px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.34);
      backdrop-filter: blur(12px);
      text-align: left;
      scroll-snap-align: start;
    }

    .game-tab.active {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px rgba(255, 200, 87, .3), 0 0 26px rgba(255, 200, 87, .18);
      transform: scale(1.03);
    }

    .game-tab .g {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 900;
      color: white;
    }

    .game-tab .date {
      color: var(--muted);
      margin-top: 8px;
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 3px 8px;
      margin-top: 9px;
      font-size: 12px;
      color: #10131f;
      background: var(--gold);
      font-weight: 800;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px minmax(0, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    .team-card, .center-panel, .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(12px);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .28);
    }

    .team-card {
      position: relative;
      min-height: 330px;
      padding: 22px;
      overflow: hidden;
    }

    .team-card.red {
      border-color: rgba(255, 49, 93, .45);
      box-shadow: inset 0 0 0 1px rgba(255,49,93,.14), 0 0 34px rgba(255, 49, 93, .15);
    }

    .team-card.blue {
      border-color: rgba(54, 245, 255, .42);
      box-shadow: inset 0 0 0 1px rgba(54,245,255,.13), 0 0 34px rgba(33, 168, 255, .14);
    }

    .team-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent, rgba(255,255,255,.08), transparent);
      transform: translateX(-120%);
      animation: sheen 8s ease-in-out infinite;
    }

    @keyframes sheen {
      0%, 55% { transform: translateX(-120%); }
      72%, 100% { transform: translateX(120%); }
    }

    .silhouette {
      position: absolute;
      right: 12px;
      bottom: -8px;
      width: 180px;
      height: 250px;
      opacity: .16;
      filter: blur(.2px);
    }

    .team-logo {
      position: relative;
      z-index: 3;
      width: min(150px, 42vw);
      height: 118px;
      display: block;
      margin-bottom: 12px;
      filter: drop-shadow(0 12px 22px rgba(0,0,0,.36));
    }

    .team-card.blue .team-logo {
      width: min(142px, 40vw);
    }

    .team-title {
      position: relative;
      z-index: 2;
      margin: 20px 0 8px;
      font-size: clamp(28px, 5vw, 52px);
      line-height: 1.02;
      font-weight: 1000;
      text-shadow: 0 0 24px currentColor;
    }

    .team-card.red .team-title { color: #ff6a88; }
    .team-card.blue .team-title { color: #66d8ff; }

    .team-subtitle {
      position: relative;
      z-index: 2;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .08em;
    }

    .team-stats {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 34px;
    }

    .mini-stat {
      background: rgba(255,255,255,.07);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .mini-stat b {
      display: block;
      font-size: 18px;
      margin-top: 4px;
    }

    .ball {
      position: relative;
      z-index: 2;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.65), transparent 12%),
        linear-gradient(135deg, #ff9a2f, #b64d12);
      box-shadow: inset -8px -10px 16px rgba(0,0,0,.25), 0 12px 24px rgba(0,0,0,.25);
      animation: spinFloat 4.5s ease-in-out infinite;
    }

    .ball::before, .ball::after {
      content: "";
      position: absolute;
      inset: 12px;
      border: 2px solid rgba(40, 15, 8, .65);
      border-left: 0;
      border-right: 0;
      border-radius: 50%;
      transform: rotate(28deg);
    }

    .ball::after {
      inset: 0 27px;
      border: 0;
      border-left: 2px solid rgba(40, 15, 8, .7);
      transform: rotate(15deg);
    }

    @keyframes spinFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(18deg); }
    }

    .floating-ball {
      position: fixed;
      width: 84px;
      height: 84px;
      opacity: .32;
      pointer-events: none;
      z-index: 0;
    }

    .floating-ball.left { left: 4vw; top: 34vh; }
    .floating-ball.right { right: 5vw; top: 62vh; animation-delay: -2s; }

    .center-panel {
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
      text-align: center;
    }

    .versus {
      font-size: 54px;
      line-height: 1;
      font-weight: 1000;
      color: white;
      text-shadow: 0 0 28px rgba(255, 200, 87, .44);
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }

    .timebox {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      padding: 10px 4px;
    }

    .timebox b {
      display: block;
      color: var(--gold);
      font-size: 22px;
      animation: tickPop .8s ease infinite;
    }

    @keyframes tickPop {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1px); }
    }

    .pool-value {
      font-size: 28px;
      font-weight: 1000;
      color: var(--green);
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, .9fr);
      gap: 16px;
      margin-top: 16px;
    }

    .panel {
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .bet-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      color: var(--text);
      padding: 13px 12px;
      outline: none;
    }

    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(255, 200, 87, .12);
    }

    .cost {
      min-width: 160px;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 12px;
      color: var(--muted);
      background: rgba(0,0,0,.22);
    }

    .cost b {
      display: block;
      color: white;
      font-size: 18px;
      margin-top: 4px;
    }

    .bet-buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .team-bet {
      min-height: 58px;
      font-weight: 900;
      padding: 14px;
    }

    .team-bet.red { background: linear-gradient(135deg, #ff315d, #7d1cff); }
    .team-bet.blue { background: linear-gradient(135deg, #137cff, #22f1ff); }

    .claim-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .records {
      display: grid;
      gap: 8px;
    }

    .record {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      background: rgba(255,255,255,.06);
      color: var(--muted);
    }

    .record strong { color: white; }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      min-width: 230px;
      padding: 13px 15px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(7, 10, 19, .88);
      backdrop-filter: blur(14px);
      transform: translateY(130%);
      transition: transform .25s ease;
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
    }

    .toast.show { transform: translateY(0); }
    .toast.ok { border-color: rgba(67, 232, 141, .4); }
    .toast.err { border-color: rgba(255, 49, 93, .45); }

    .particle {
      position: fixed;
      z-index: 30;
      pointer-events: none;
      font-size: 24px;
      animation: fly 1.4s ease-out forwards;
    }

    @keyframes fly {
      from { transform: translateY(0) scale(.6) rotate(0deg); opacity: 1; }
      to { transform: translateY(-160px) scale(1.4) rotate(80deg); opacity: 0; }
    }

    @media (max-width: 980px) {
      .hero-grid, .content-grid {
        grid-template-columns: 1fr;
      }
      .center-panel { order: -1; }
      .team-card { min-height: 280px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .wallet-box { justify-content: flex-start; }
    }

    @media (max-width: 560px) {
      .app { width: min(100% - 20px, 1240px); }
      .bet-buttons, .bet-controls, .team-stats {
        grid-template-columns: 1fr;
      }
      .countdown { grid-template-columns: repeat(2, 1fr); }
      .team-title { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="floating-ball ball left"></div>
  <div class="floating-ball ball right"></div>

  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">🏀</div>
        <div>
          <h1>CBA Finals Predictor</h1>
          <div class="tagline">燃烧 CBA 代币，竞猜总冠军</div>
        </div>
      </div>
      <div class="wallet-box">
        <div class="social-links">
          <a class="social-link telegram" id="telegramLink" href="#" target="_blank" rel="noopener" aria-label="Telegram">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path fill="#fff" d="M27.5 6.1 23.6 25c-.3 1.3-1.1 1.6-2.2 1l-6.1-4.5-3 2.9c-.3.3-.6.6-1.3.6l.5-6.2L22.8 8.9c.5-.4-.1-.7-.7-.3L8 17.5l-6-1.9c-1.3-.4-1.3-1.3.3-1.9L25.8 4.6c1.1-.4 2.1.3 1.7 1.5Z"/>
            </svg>
          </a>
          <a class="social-link x-social" id="xLink" href="#" target="_blank" rel="noopener" aria-label="X">

              <path fill="#fff" d="M18.8 13.7 29.7 1h-2.6l-9.5 11L10.1 1H1.4l11.4 16.6L1.4 31h2.6l10-11.7L22 31h8.7L18.8 13.7Zm-3.5 4.1-1.2-1.7L5 3h3.9l7.4 10.6 1.2 1.7L27.1 29h-3.9l-7.9-11.2Z"/>
            </svg>
          </a>
        </div>
        <div class="wallet-state" id="walletState">未连接钱包</div>
        <button class="ghost-btn" id="disconnectBtn" style="display:none">断开</button>
        <button class="primary-btn" id="connectBtn">连接钱包</button>
      </div>
    </header>

    <div class="notice" id="networkNotice"></div>

    <section class="schedule" id="schedule"></section>

    <section class="hero-grid">
      <article class="team-card red">
        <svg class="team-logo shanghai-logo" viewBox="0 0 260 210" role="img" aria-label="上海久事 Sharks logo">
          <path d="M32 44L196 16l36 58l-40 70l-72 47l-88-31l-14-72z" fill="#fff" opacity=".96"/>

          <path d="M29 49L192 22l28 48l-38 59l-64 42l-76-26l-12-58z" fill="#f58220"/>

          <path d="M66 127c27-36 68-56 123-58c-44 14-76 38-96 72c18-11 38-17 61-19c-22 21-45 35-70 42c-15 4-26-10-18-37z" fill="#fff"/>
          <path d="M77 137c13-16 31-25 53-28l-21 33l33-8c-28 30-56 32-65 3z" fill="#143c77"/>

          <text x="72" y="47" font-size="21" font-weight="900" fill="#143c77">上海 SHANGHAI</text>
        </svg>
        <svg class="silhouette" viewBox="0 0 160 220" aria-hidden="true">
          <path fill="white" d="M82 25a22 22 0 1 0 0 44a22 22 0 0 0 0-44Zm-8 50c-20 4-35 17-41 42l18 5c4-12 10-20 19-24l-7 46l-28 45l17 12l28-41l30 47l18-11l-31-58l5-37c9 5 16 13 25 24l16-12c-18-26-36-41-69-38Z"/>
        </svg>
        <div class="team-subtitle">2026 CBA FINALS</div>

        <div class="team-stats">

      <aside class="center-panel">
        <div>
          <div class="tagline" id="selectedGameLabel">Game 1 · 5/26 19:35</div>
          <div class="versus">VS</div>

        <div class="countdown">
          <div class="timebox"><b id="days">0</b><span>天</span></div>

          <div class="timebox"><b id="seconds">0</b><span>秒</span></div>
        </div>
        <div>
          <div class="tagline">当前奖池</div>
          <div class="pool-value" id="poolValue">-- CBA</div>
        </div>
        <button class="ghost-btn" id="refreshBtn">刷新数据</button>
      </aside>

      <article class="team-card blue">
        <svg class="team-logo zhejiang-logo" viewBox="0 0 250 190" role="img" aria-label="浙江 Lions logo">
          <path d="M22 151L53 60L124 21l73 21l31 57l-24 71H52z" fill="#0b0b0e" stroke="#f2bb2e" stroke-width="7" stroke-linejoin="round"/>

          <path d="M87 75c13-25 43-42 75-28c-24 2-40 10-51 25c18-10 39-11 61-2c-17 5-29 14-37 27c19-9 38-8 58 2c-30 3-56 16-78 39c-15 16-34 12-46-6c20-5 36-15 49-29c-15 2-29 7-41 15c1-17 5-31 10-43z" fill="#0b0b0e"/>

          <path d="M157 66l13 11l-21 2z" fill="#fff"/>

          <text x="70" y="112" font-size="23" font-weight="1000" fill="#f6c134" stroke="#0b0b0e" stroke-width="4" paint-order="stroke">ZJLIONS</text>
        </svg>
        <svg class="silhouette" viewBox="0 0 160 220" aria-hidden="true">
          <path fill="white" d="M63 22a22 22 0 1 0 0 44a22 22 0 0 0 0-44Zm-3 50l-28 31l14 13l14-15l-6 40l-30 51l18 10l29-45l22 49l20-8l-21-56l10-41l19 23l15-13l-30-34c-12-9-29-11-46-5Z"/>
        </svg>
        <div class="team-subtitle">2026 CBA FINALS</div>
        <div class="team-title">浙江浙商证券</div>
        <div class="tagline">Zhejiang Zheshang Securities · 闪电客场</div>
        <div class="team-stats">
          <div class="mini-stat">我的投注<b id="myZhejiangCard">0 注</b></div>
          <div class="mini-stat">队伍色彩<b style="color:var(--cyan)">BLUE</b></div>
        </div>
      </article>
    </section>

    <section class="content-grid">
      <article class="panel">
        <h2>竞猜面板</h2>
        <div class="bet-controls">
          <div>
            <label for="ticketInput">注数（1-100，每注 5000 CBA）</label>
            <input id="ticketInput" type="number" min="1" max="100" value="1" />
          </div>
          <div class="cost">
            总消耗
            <b id="totalCost">5000 CBA</b>
          </div>
        </div>
        <div class="bet-buttons">
          <button class="team-bet red" id="betShanghai">🔥 押上海久事胜</button>
          <button class="team-bet blue" id="betZhejiang">⚡ 押浙江浙商证券胜</button>
        </div>
        <div class="claim-row">
          <div>
            <b>我的投注</b>
            <div class="tagline" id="myBetSummary">上海 0 注 · 浙江 0 注</div>
          </div>
          <button class="primary-btn" id="claimBtn" disabled>领取奖励</button>
        </div>
      </article>

      <article class="panel">
        <h2>最近 10 条投注</h2>
        <div class="records" id="records"></div>
      </article>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const CBA_TOKEN_ADDRESS = "0x0000000000000000000000000000000000000000";
    const CONTRACT_ADDRESS = "0x0000000000000000000000000000000000000000";
    const TELEGRAM_URL = "https://t.me/CBAquanqiu888";
    const X_URL = "https://x.com/signalmika86144";
    const GAME_START_TIMESTAMPS = [
      1779795300, // 2026-05-26 19:35 Beijing
      1779968100, // 2026-05-28 19:35 Beijing
      1780227300, // 2026-05-31 19:35 Beijing
      1780400100, // 2026-06-02 19:35 Beijing
      1780659300, // 2026-06-05 19:35 Beijing
      1780918500, // 2026-06-08 19:35 Beijing
      1781177700  // 2026-06-11 19:35 Beijing
    ];
    const BET_AMOUNT_PER_TICKET = 5000;
    const BSC_MAINNET = "0x38";
    const BSC_TESTNET = "0x61";
    const TEAM_SHANGHAI = 0;
    const TEAM_ZHEJIANG = 1;

    const ERC20_ABI = [
      "function balanceOf(address owner) view returns (uint256)",
      "function allowance(address owner,address spender) view returns (uint256)",
      "function approve(address spender,uint256 amount) returns (bool)",
      "function decimals() view returns (uint8)",
      "function symbol() view returns (string)"
    ];

    const SERIES_ABI = [
      "function bet(uint8 gameId,uint8 team,uint256 amount) external",
      "function settle(uint8 gameId,uint8 winner) external",
      "function claimRewards(uint8 gameId) external",
      "function getPrizePool(uint8 gameId) external view returns (uint256)",
      "function getUserBetAmount(address user,uint8 gameId,uint8 team) external view returns (uint256)",
      "function isGameSettled(uint8 gameId) external view returns (bool)",
      "function gameWinner(uint8 gameId) external view returns (uint8)",
      "function hasClaimed(address user,uint8 gameId) external view returns (bool)",
      "event BetPlaced(address indexed user,uint8 indexed gameId,uint8 indexed team,uint256 amount,uint256 tickets)",
      "event GameSettled(uint8 indexed gameId,uint8 winner)",
      "event RewardsClaimed(address indexed user,uint8 indexed gameId,uint256 amount)"
    ];

    const games = [
      { label: "Game 1", date: "5/26", full: "2026年5月26日 19:35" },
      { label: "Game 2", date: "5/28", full: "2026年5月28日 19:35" },
      { label: "Game 3", date: "5/31", full: "2026年5月31日 19:35" },
      { label: "Game 4", date: "6/2", full: "2026年6月2日 19:35" },
      { label: "Game 5", date: "6/5", full: "2026年6月5日 19:35（如需）" },
      { label: "Game 6", date: "6/8", full: "2026年6月8日 19:35（如需）" },
      { label: "Game 7", date: "6/11", full: "2026年6月11日 19:35（如需）" }
    ];

    let provider, signer, account, token, series, tokenDecimals = 18, tokenSymbol = "CBA";
    let selectedGame = 0;
    let settled = Array(7).fill(false);
    let winners = Array(7).fill(null);
    let myBets = Array.from({ length: 7 }, () => [ethers.BigNumber.from(0), ethers.BigNumber.from(0)]);
    let busy = false;

    const els = {
      schedule: document.getElementById("schedule"),
      walletState: document.getElementById("walletState"),
      connectBtn: document.getElementById("connectBtn"),
      disconnectBtn: document.getElementById("disconnectBtn"),
      networkNotice: document.getElementById("networkNotice"),
      selectedGameLabel: document.getElementById("selectedGameLabel"),
      days: document.getElementById("days"),
      hours: document.getElementById("hours"),
      minutes: document.getElementById("minutes"),
      seconds: document.getElementById("seconds"),
      poolValue: document.getElementById("poolValue"),
      ticketInput: document.getElementById("ticketInput"),
      totalCost: document.getElementById("totalCost"),
      betShanghai: document.getElementById("betShanghai"),
      betZhejiang: document.getElementById("betZhejiang"),
      claimBtn: document.getElementById("claimBtn"),
      myBetSummary: document.getElementById("myBetSummary"),
      myShanghaiCard: document.getElementById("myShanghaiCard"),
      myZhejiangCard: document.getElementById("myZhejiangCard"),
      records: document.getElementById("records"),
      refreshBtn: document.getElementById("refreshBtn"),
      toast: document.getElementById("toast")
    };

    function renderSchedule() {
      els.schedule.innerHTML = "";
      games.forEach((game, index) => {
        const hasBet = myBets[index] && (myBets[index][0].gt(0) || myBets[index][1].gt(0));
        const btn = document.createElement("button");
        btn.className = `game-tab ${index === selectedGame ? "active" : ""}`;
        btn.innerHTML = `
          <div class="g"><span>G${index + 1}</span><span>${hasBet ? "🏀" : "○"}</span></div>
          <div class="date">${game.date} · 19:35</div>
          ${settled[index] ? `<span class="badge">${teamName(winners[index])} 胜</span>` : ""}
        `;
        btn.onclick = () => selectGame(index);
        els.schedule.appendChild(btn);
      });
    }

    async function connectWallet() {
      if (!window.ethereum) {
        toast("未检测到 MetaMask 钱包", "err");
        return;
      }
      provider = new ethers.providers.Web3Provider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = provider.getSigner();
      account = await signer.getAddress();
      token = new ethers.Contract(CBA_TOKEN_ADDRESS, ERC20_ABI, signer);
      series = new ethers.Contract(CONTRACT_ADDRESS, SERIES_ABI, signer);
      try { tokenDecimals = await token.decimals(); } catch (_) {}
      try { tokenSymbol = await token.symbol(); } catch (_) {}
      bindWalletEvents();
      await refreshAll();
    }

    function bindWalletEvents() {
      window.ethereum.removeAllListeners?.("accountsChanged");
      window.ethereum.removeAllListeners?.("chainChanged");
      window.ethereum.on("accountsChanged", () => window.location.reload());
      window.ethereum.on("chainChanged", () => window.location.reload());
    }

    function disconnectWallet() {
      provider = signer = account = token = series = null;
      els.walletState.textContent = "未连接钱包";
      els.connectBtn.style.display = "";
      els.disconnectBtn.style.display = "none";
      renderSchedule();
      updateButtons();
    }

    async function checkNetwork() {
      if (!window.ethereum) return false;
      const chainId = await window.ethereum.request({ method: "eth_chainId" });
      const ok = chainId === BSC_MAINNET || chainId === BSC_TESTNET;
      els.networkNotice.style.display = ok ? "none" : "block";
      els.networkNotice.textContent = ok ? "" : "当前钱包不在 BSC 主网或测试网，请切换到 BSC 网络。";
      return ok;
    }

    async function switchToBsc() {
      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: BSC_MAINNET }]
      });
    }

    async function refreshAll() {
      await checkNetwork();
      await refreshWallet();
      await fetchGameState(selectedGame);
      await fetchRecentBets(selectedGame);
      renderSchedule();
      updateButtons();
    }

    async function refreshWallet() {
      if (!account || !token) {
        els.walletState.textContent = "未连接钱包";
        return;
      }
      const balance = await token.balanceOf(account);
      els.walletState.textContent = `${short(account)} · ${fmtToken(balance)} ${tokenSymbol}`;
      els.connectBtn.style.display = "none";
      els.disconnectBtn.style.display = "";
    }

    async function fetchPrizePool(gameId) {
      if (!series) return ethers.BigNumber.from(0);
      return await series.getPrizePool(gameId);
    }

    async function fetchUserBet(gameId) {
      if (!series || !account) return [ethers.BigNumber.from(0), ethers.BigNumber.from(0)];
      const [s, z] = await Promise.all([
        series.getUserBetAmount(account, gameId, TEAM_SHANGHAI),
        series.getUserBetAmount(account, gameId, TEAM_ZHEJIANG)
      ]);
      myBets[gameId] = [s, z];
      return [s, z];
    }

    async function fetchSettlement(gameId) {
      if (!series) return;
      try {
        settled[gameId] = await series.isGameSettled(gameId);
      } catch (_) {
        settled[gameId] = false;
      }
      if (settled[gameId]) {
        try { winners[gameId] = Number(await series.gameWinner(gameId)); } catch (_) {}
      }
    }

    async function fetchGameState(gameId) {
      els.selectedGameLabel.textContent = `${games[gameId].label} · ${games[gameId].full}`;
      if (!series) {
        els.poolValue.textContent = "-- CBA";
        updateMyBets([ethers.BigNumber.from(0), ethers.BigNumber.from(0)]);
        return;
      }
      try {
        const [pool, bets] = await Promise.all([fetchPrizePool(gameId), fetchUserBet(gameId), fetchSettlement(gameId)]);
        els.poolValue.textContent = `${fmtToken(pool)} ${tokenSymbol}`;
        updateMyBets(bets);
      } catch (error) {
        toast(`刷新失败：${error.message || error}`, "err");
      }
    }

    function updateMyBets(bets) {
      const sTickets = ticketsFromAmount(bets[0]);
      const zTickets = ticketsFromAmount(bets[1]);
      els.myBetSummary.textContent = `上海 ${sTickets} 注（${fmtToken(bets[0])} ${tokenSymbol}） · 浙江 ${zTickets} 注（${fmtToken(bets[1])} ${tokenSymbol}）`;
      els.myShanghaiCard.textContent = `${sTickets} 注`;
      els.myZhejiangCard.textContent = `${zTickets} 注`;
    }

    async function getCBAAllowance() {
      if (!token || !account) return ethers.BigNumber.from(0);
      return await token.allowance(account, CONTRACT_ADDRESS);
    }

    async function approveCBA(amount) {
      const tx = await token.approve(CONTRACT_ADDRESS, amount);
      toast("等待授权确认...");
      await tx.wait();
      toast("授权成功", "ok");
    }

    async function placeBet(gameId, team, tickets) {
      if (busy) return;
      if (!account) {
        toast("请先连接钱包", "err");
        return;
      }
      const networkOk = await checkNetwork();
      if (!networkOk) {
        try { await switchToBsc(); } catch (error) { toast("请切换到 BSC 网络", "err"); return; }
      }
      if (Date.now() / 1000 >= GAME_START_TIMESTAMPS[gameId]) {
        toast("比赛已开始，无法下注", "err");
        return;
      }
      if (settled[gameId]) {
        toast("该场已结算", "err");
        return;
      }

      busy = true;
      updateButtons();
      try {
        const amount = amountFromTickets(tickets);
        const balance = await token.balanceOf(account);
        if (balance.lt(amount)) throw new Error("CBA 余额不足");
        const allowance = await getCBAAllowance();
        if (allowance.lt(amount)) await approveCBA(amount);
        toast("请在钱包确认下注交易...");
        const tx = await series.bet(gameId, team, amount);
        await tx.wait();
        toast("🏀 投注成功", "ok");
        burst();
        await refreshAll();
      } catch (error) {
        toast(`投注失败：${error.data?.message || error.message || error}`, "err");
      } finally {
        busy = false;
        updateButtons();
      }
    }

    async function claimRewards(gameId) {
      if (!series || busy) return;
      busy = true;
      updateButtons();
      try {
        toast("请在钱包确认领取交易...");
        const tx = await series.claimRewards(gameId);
        await tx.wait();
        toast("奖励已领取", "ok");
        burst();
        await refreshAll();
      } catch (error) {
        toast(`领取失败：${error.data?.message || error.message || error}`, "err");
      } finally {
        busy = false;
        updateButtons();
      }
    }

    async function fetchRecentBets(gameId) {
      els.records.innerHTML = `<div class="record"><span>等待链上记录</span><strong>--</strong></div>`;
      if (!series || !provider) return;
      try {
        const filter = series.filters.BetPlaced(null, gameId);
        const latest = await provider.getBlockNumber();
        const events = await series.queryFilter(filter, Math.max(0, latest - 50000), latest);
        const rows = events.slice(-10).reverse();
        els.records.innerHTML = rows.length ? "" : `<div class="record"><span>暂无投注</span><strong>--</strong></div>`;
        for (const ev of rows) {
          const user = ev.args.user;
          const team = Number(ev.args.team);
          const amount = ev.args.amount;
          const block = await provider.getBlock(ev.blockNumber);
          const div = document.createElement("div");
          div.className = "record";
          div.innerHTML = `<span><strong>${short(user)}</strong> 押${teamName(team)} ${ticketsFromAmount(amount)}注</span><strong>${relativeTime(block.timestamp)}</strong>`;
          els.records.appendChild(div);
        }
      } catch (_) {
        els.records.innerHTML = `<div class="record"><span>合约未提供 BetPlaced 事件或 RPC 限制</span><strong>--</strong></div>`;
      }
    }

    function updateCountdown() {
      const diff = Math.max(0, GAME_START_TIMESTAMPS[selectedGame] - Math.floor(Date.now() / 1000));
      const d = Math.floor(diff / 86400);
      const h = Math.floor((diff % 86400) / 3600);
      const m = Math.floor((diff % 3600) / 60);
      const s = diff % 60;
      els.days.textContent = d;
      els.hours.textContent = h;
      els.minutes.textContent = m;
      els.seconds.textContent = s;
      updateButtons();
    }

    function updateButtons() {
      const gameStarted = Date.now() / 1000 >= GAME_START_TIMESTAMPS[selectedGame];
      const invalidContract = CBA_TOKEN_ADDRESS === ethers.constants.AddressZero || CONTRACT_ADDRESS === ethers.constants.AddressZero;
      const disabled = busy || !account || gameStarted || settled[selectedGame] || invalidContract;
      els.betShanghai.disabled = disabled;
      els.betZhejiang.disabled = disabled;
      els.claimBtn.disabled = busy || !account || !settled[selectedGame];
      if (invalidContract) {
        els.networkNotice.style.display = "block";
        els.networkNotice.textContent = "请先在 HTML 顶部配置 CBA_TOKEN_ADDRESS 和 CONTRACT_ADDRESS。";
      }
    }

    function selectGame(index) {
      selectedGame = index;
      renderSchedule();
      fetchGameState(index);
      fetchRecentBets(index);
      updateCountdown();
    }

    function amountFromTickets(tickets) {
      return ethers.utils.parseUnits(String(tickets * BET_AMOUNT_PER_TICKET), tokenDecimals);
    }

    function ticketsFromAmount(amount) {
      if (!amount || amount.isZero()) return 0;
      return Math.floor(Number(ethers.utils.formatUnits(amount, tokenDecimals)) / BET_AMOUNT_PER_TICKET);
    }

    function fmtToken(value) {
      const n = Number(ethers.utils.formatUnits(value || 0, tokenDecimals));
      return n.toLocaleString("en-US", { maximumFractionDigits: 2 });
    }

    function short(address) {
      return address ? `${address.slice(0, 6)}...${address.slice(-4)}` : "--";
    }

    function teamName(team) {
      return Number(team) === TEAM_SHANGHAI ? "上海" : "浙江";
    }

    function relativeTime(timestamp) {
      const diff = Math.max(0, Math.floor(Date.now() / 1000) - Number(timestamp));
      if (diff < 60) return `${diff}s`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m`;
      return `${Math.floor(diff / 3600)}h`;
    }

    function toast(message, type = "") {
      els.toast.textContent = message;
      els.toast.className = `toast show ${type}`;
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => els.toast.className = "toast", 3200);
    }

    function burst() {
      for (let i = 0; i < 18; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.textContent = "🏀";
        p.style.left = `${20 + Math.random() * 60}vw`;
        p.style.top = `${70 + Math.random() * 20}vh`;
        p.style.animationDelay = `${Math.random() * .18}s`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1600);
      }
    }

    function syncTicketCost() {
      let tickets = Number(els.ticketInput.value || 1);
      tickets = Math.max(1, Math.min(100, Math.floor(tickets)));
      els.ticketInput.value = tickets;
      els.totalCost.textContent = `${(tickets * BET_AMOUNT_PER_TICKET).toLocaleString("en-US")} ${tokenSymbol}`;
    }

    els.connectBtn.onclick = connectWallet;
    els.disconnectBtn.onclick = disconnectWallet;
    els.refreshBtn.onclick = refreshAll;
    els.ticketInput.oninput = syncTicketCost;
    els.betShanghai.onclick = () => placeBet(selectedGame, TEAM_SHANGHAI, Number(els.ticketInput.value || 1));
    els.betZhejiang.onclick = () => placeBet(selectedGame, TEAM_ZHEJIANG, Number(els.ticketInput.value || 1));
    els.claimBtn.onclick = () => claimRewards(selectedGame);
    document.getElementById("telegramLink").href = TELEGRAM_URL;
    document.getElementById("xLink").href = X_URL;

    renderSchedule();
    syncTicketCost();
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
